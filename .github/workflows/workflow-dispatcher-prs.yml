name: PR Workflow Dispatcher

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'ISO 8601 timestamp — find PRs updated at or after this time (default: time of last successful run)'
        required: false
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: write
  actions: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  find-prs:
    name: Find PRs to dispatch
    runs-on: ubuntu-latest
    outputs:
      pr-file-reviewer-matrix: ${{ steps.build-matrix.outputs.pr-file-reviewer-matrix }}
      # Add additional workflow matrix outputs here
    steps:
      - name: Restore last-successful-run timestamp
        uses: actions/cache/restore@v4
        with:
          path: /tmp/workflow-dispatcher-prs
          key: workflow-dispatcher-prs-timestamp-${{ github.run_id }}
          restore-keys: workflow-dispatcher-prs-timestamp

      - name: Determine lookback timestamp
        id: since
        env:
          WORKFLOW_STARTED_AT: ${{ github.run_started_at }}
        run: |
          MANUAL_SINCE="${{ github.event.inputs.since }}"
          CACHED_SINCE=""
          if [ -f /tmp/workflow-dispatcher-prs/last-successful-run ]; then
            CACHED_SINCE=$(cat /tmp/workflow-dispatcher-prs/last-successful-run)
          fi

          if [ -n "$MANUAL_SINCE" ]; then
            SINCE="$MANUAL_SINCE"
          elif [ -n "$CACHED_SINCE" ]; then
            SINCE="$CACHED_SINCE"
          else
            # First run or expired cache: look back 20 minutes to avoid gaps
            SINCE=$(date -u -d '20 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          fi

          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "Using lookback timestamp: $SINCE"

      - name: Find PRs updated since last successful run
        id: find-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE: ${{ steps.since.outputs.since }}
        run: |
          # Fetch all PRs (open and closed) updated since the last successful run,
          # including head SHA for cache-based skip checks.
          PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state all \
            --json number,isDraft,state,updatedAt,headRefOid \
            --limit 100 \
            --jq "[.[] | select(.updatedAt >= \"$SINCE\")]")

          echo "PRs updated since $SINCE:"
          PR_COUNT=$(echo "$PRS" | jq 'length')
          if [ "$PR_COUNT" -eq "0" ]; then
            echo "  (none)"
          else
            echo "$PRS" | jq -r '.[] | "  PR #\(.number) (\(.state)\(if .isDraft then ", draft" else "" end)) @ \(.headRefOid[:7])"'
          fi
          echo "prs=$PRS" >> "$GITHUB_OUTPUT"

      - name: Build workflow dispatch matrices
        id: build-matrix
        env:
          PRS: ${{ steps.find-prs.outputs.prs }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          #
          # pr-file-reviewer: applies to non-draft PRs (open or closed)
          #
          CANDIDATES=$(echo "$PRS" | jq -c '[.[] | select(.isDraft == false)]')

          PR_FILE_REVIEWER="[]"
          for ROW in $(echo "$CANDIDATES" | jq -c '.[]'); do
            PR_NUMBER=$(echo "$ROW" | jq -r '.number')
            HEAD_SHA=$(echo "$ROW" | jq -r '.headRefOid')
            CACHE_KEY="pr-file-reviewer-${PR_NUMBER}-${HEAD_SHA}"
            CACHE_EXISTS=$(gh api "repos/${REPO}/actions/caches?key=${CACHE_KEY}" --jq '.total_count')

            if [ "$CACHE_EXISTS" -gt "0" ]; then
              echo "  pr-file-reviewer: PR #${PR_NUMBER} already reviewed at ${HEAD_SHA:0:7} — skipping"
            else
              echo "  pr-file-reviewer: PR #${PR_NUMBER} needs review at ${HEAD_SHA:0:7}"
              PR_FILE_REVIEWER=$(echo "$PR_FILE_REVIEWER" | jq -c ". + [{\"pr_number\": $PR_NUMBER, \"head_sha\": \"$HEAD_SHA\"}]")
            fi
          done

          echo "pr-file-reviewer matrix: $PR_FILE_REVIEWER"
          echo "pr-file-reviewer-matrix=$PR_FILE_REVIEWER" >> "$GITHUB_OUTPUT"

          #
          # Add additional workflow matrix building here.
          # Each workflow can have its own candidate filtering and cache key prefix.
          #

  # ──────────────────────────────────────────────
  # PR File Reviewer
  # ──────────────────────────────────────────────

  pr-file-reviewer:
    name: "PR File Reviewer (#${{ matrix.pr_number }})"
    needs: find-prs
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include: ${{ fromJSON(needs.find-prs.outputs.pr-file-reviewer-matrix) }}
    uses: ./.github/workflows/pr-file-reviewer.lock.yml
    with:
      pr_number: ${{ matrix.pr_number }}
      head_sha: ${{ matrix.head_sha }}
    secrets: inherit

  record-run_pr-file-reviewer:
    name: "Record PR File Review (#${{ matrix.pr_number }})"
    needs: [find-prs, pr-file-reviewer]
    if: always() && needs.pr-file-reviewer.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.find-prs.outputs.pr-file-reviewer-matrix) }}
    steps:
      - name: Save completion marker
        run: |
          echo "Recording successful run for PR #${{ matrix.pr_number }} at ${{ matrix.head_sha }}"
          mkdir -p /tmp/workflow-run-marker
          echo "reviewed" > /tmp/workflow-run-marker/done
      - uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-run-marker
          key: pr-file-reviewer-${{ matrix.pr_number }}-${{ matrix.head_sha }}

  # ──────────────────────────────────────────────
  # Add additional PR workflow sections here.
  # Pattern: workflow job → record-run_<workflow-name> job
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # Dispatcher bookkeeping
  # ──────────────────────────────────────────────

  record-successful-run:
    name: Record successful run timestamp
    runs-on: ubuntu-latest
    needs: [find-prs, pr-file-reviewer, record-run_pr-file-reviewer]
    # Add additional workflow jobs to the needs list as they are added
    if: always() && needs.find-prs.result == 'success' && needs.pr-file-reviewer.result == 'success'
    steps:
      - name: Write last-successful-run timestamp
        env:
          WORKFLOW_STARTED_AT: ${{ github.run_started_at }}
        run: |
          mkdir -p /tmp/workflow-dispatcher-prs
          echo "$WORKFLOW_STARTED_AT" > /tmp/workflow-dispatcher-prs/last-successful-run

      - name: Save last-successful-run timestamp
        uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-dispatcher-prs
          key: workflow-dispatcher-prs-timestamp-${{ github.run_id }}
