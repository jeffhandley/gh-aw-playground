name: PR Workflow Dispatcher

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'ISO 8601 timestamp — find PRs updated at or after this time (default: time of last successful run)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  DISPATCHED_WORKFLOWS: "pr-file-reviewer pr-labeler"

jobs:
  poll-prs:
    name: Poll PRs
    runs-on: ubuntu-latest
    outputs:
      pr-numbers: ${{ steps.build-matrix.outputs.pr-numbers }}
      pr-include: ${{ steps.build-matrix.outputs.pr-include }}
    steps:
      - name: Restore dispatcher state
        uses: actions/cache/restore@v5
        with:
          path: /tmp/dispatcher-state
          key: workflow-dispatcher-prs-${{ github.run_id }}
          restore-keys: workflow-dispatcher-prs-

      - name: Determine lookback timestamp
        id: since
        env:
          MANUAL_SINCE: ${{ github.event.inputs.since }}
        run: |
          STATE_FILE="/tmp/dispatcher-state/state.json"

          # Read dispatcher state from cache
          STORED_SINCE=""
          if [ -f "$STATE_FILE" ]; then
            STORED_SINCE=$(jq -r '.dispatcher.timestamp // empty' "$STATE_FILE")
          fi

          if [ -n "$MANUAL_SINCE" ]; then
            SINCE="$MANUAL_SINCE"
          elif [ -n "$STORED_SINCE" ]; then
            SINCE="$STORED_SINCE"
          else
            # First run or expired cache: look back to the beginning of today (UTC)
            SINCE=$(date -u '+%Y-%m-%dT00:00:00Z')
            echo "::notice::No previous run found — falling back to beginning of today (UTC): $SINCE"
          fi

          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "Using lookback timestamp: $SINCE"

      - name: Find PRs and build dispatch matrices
        id: build-matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE: ${{ steps.since.outputs.since }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch all PRs (open and closed) updated since the last successful run,
          # including head SHA for skip checks.
          PRS=$(gh pr list \
            --repo "$REPO" \
            --state all \
            --json number,isDraft,state,updatedAt,headRefOid \
            --limit 100 \
            --jq "[.[] | select(.updatedAt >= \"$SINCE\")]")

          PR_COUNT=$(echo "$PRS" | jq 'length')
          echo "PRs updated since $SINCE:"
          if [ "$PR_COUNT" -eq "0" ]; then
            echo "  (none)"
          else
            echo "$PRS" | jq -r '.[] | "  PR #\(.number) (\(.state)\(if .isDraft then ", draft" else "" end)) @ \(.headRefOid[:7])"'
          fi

          # Build a unified matrix of all updated PRs.
          # Each workflow is responsible for its own eligibility filtering.
          # The dispatcher uses the latest event ID as a cursor — any PR activity
          # (push, label, close, ready_for_review, etc.) produces a new event ID,
          # ensuring the PR gets re-dispatched when anything changes.
          STATE_FILE="/tmp/dispatcher-state/state.json"

          MATRIX="[]"
          DISPATCHED=""
          SKIPPED=""
          SKIP_COUNT=0

          echo ""
          for ROW in $(echo "$PRS" | jq -c '.[]'); do
            PR_NUMBER=$(echo "$ROW" | jq -r '.number')
            HEAD_SHA=$(echo "$ROW" | jq -r '.headRefOid')
            STATE=$(echo "$ROW" | jq -r '.state')
            IS_DRAFT=$(echo "$ROW" | jq -r '.isDraft')

            # Get the latest event ID for this PR as a change cursor
            LAST_EVENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/events" --jq 'last | .id // empty')
            if [ -z "$LAST_EVENT_ID" ]; then
              LAST_EVENT_ID="none"
            fi

            PR_LABEL="[#${PR_NUMBER}](https://github.com/${REPO}/pull/${PR_NUMBER})"
            if [ "$IS_DRAFT" = "true" ]; then
              PR_LABEL="${PR_LABEL} (draft)"
            fi

            EVENT_LINK="${LAST_EVENT_ID}"
            if [ "$LAST_EVENT_ID" != "none" ]; then
              EVENT_LINK="[${LAST_EVENT_ID}](https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/events)"
            fi

            # Check if ALL workflows have already processed this PR at this event
            ALL_PROCESSED=true
            if [ -f "$STATE_FILE" ]; then
              for WF in $DISPATCHED_WORKFLOWS; do
                STORED_EVENT=$(jq -r --arg wf "$WF" --arg pr "$PR_NUMBER" '.workflows[$wf][$pr].event_id // empty' "$STATE_FILE")
                if [ "$STORED_EVENT" != "$LAST_EVENT_ID" ]; then
                  ALL_PROCESSED=false
                  break
                fi
              done
            else
              ALL_PROCESSED=false
            fi

            if [ "$ALL_PROCESSED" = "true" ]; then
              echo "PR #${PR_NUMBER} — all workflows completed (event ${LAST_EVENT_ID})"
              SKIPPED="${SKIPPED}| ${PR_LABEL} | ${STATE} | ${EVENT_LINK} |\n"
              SKIP_COUNT=$((SKIP_COUNT + 1))
            else
              echo "PR #${PR_NUMBER} — dispatching (event ${LAST_EVENT_ID})"
              MATRIX=$(echo "$MATRIX" | jq -c ". + [{\"pr_number\": $PR_NUMBER, \"head_sha\": \"$HEAD_SHA\", \"last_event_id\": \"$LAST_EVENT_ID\"}]")
              DISPATCHED="${DISPATCHED}| ${PR_LABEL} | ${STATE} | ${EVENT_LINK} |\n"
            fi
          done

          echo ""
          echo "Dispatch matrix: $MATRIX"
          echo "pr-numbers=$(echo "$MATRIX" | jq -c '[.[].pr_number]')" >> "$GITHUB_OUTPUT"
          echo "pr-include=$MATRIX" >> "$GITHUB_OUTPUT"

          # Step summary
          DISPATCH_COUNT=$(echo "$MATRIX" | jq 'length')
          {
            echo "## PR Workflow Dispatcher"
            echo ""
            echo "- **Lookback:** \`${SINCE}\`"
            echo "- **Workflows:**"
            for WF in $DISPATCHED_WORKFLOWS; do
              echo "  - [\`${WF}\`](https://github.com/${REPO}/blob/main/.github/workflows/${WF}.md)"
            done
            echo ""

            if [ -n "$DISPATCHED" ]; then
              echo "### Dispatching (${DISPATCH_COUNT})"
              echo ""
              echo "| PR | State | Event ID |"
              echo "| --- | --- | --- |"
              printf "%b" "$DISPATCHED"
            fi

            if [ -n "$SKIPPED" ]; then
              echo ""
              echo "<details><summary>Already completed (${SKIP_COUNT})</summary>"
              echo ""
              echo "| PR | State | Event ID |"
              echo "| --- | --- | --- |"
              printf "%b" "$SKIPPED"
              echo ""
              echo "</details>"
            fi

            if [ -z "$DISPATCHED" ] && [ -z "$SKIPPED" ]; then
              echo "No PRs updated since \`${SINCE}\`."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────
  # PR File Reviewer
  # ──────────────────────────────────────────────

  pr-file-reviewer:
    name: 'Dispatch: pr-file-reviewer'
    needs: poll-prs
    if: needs.poll-prs.outputs.pr-numbers != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pr_number: ${{ fromJSON(needs.poll-prs.outputs.pr-numbers) }}
        include: ${{ fromJSON(needs.poll-prs.outputs.pr-include) }}
    uses: ./.github/workflows/pr-file-reviewer.lock.yml
    with:
      pr_number: ${{ matrix.pr_number }}
      head_sha: ${{ matrix.head_sha }}
      artifact_id: pr-file-reviewer
    secrets: inherit

  # ──────────────────────────────────────────────
  # Add additional PR workflow sections here.
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # PR Labeler
  # ──────────────────────────────────────────────

  pr-labeler:
    name: 'Dispatch: pr-labeler'
    needs: poll-prs
    if: needs.poll-prs.outputs.pr-numbers != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pr_number: ${{ fromJSON(needs.poll-prs.outputs.pr-numbers) }}
        include: ${{ fromJSON(needs.poll-prs.outputs.pr-include) }}
    uses: ./.github/workflows/pr-labeler.lock.yml
    with:
      pr_number: ${{ matrix.pr_number }}
      head_sha: ${{ matrix.head_sha }}
      artifact_id: pr-labeler
    secrets: inherit

  # ──────────────────────────────────────────────
  # Conclusion
  # ──────────────────────────────────────────────

  conclusion:
    name: Conclusion
    runs-on: ubuntu-latest
    needs: [poll-prs, pr-file-reviewer, pr-labeler]
    # Add additional workflow dispatch jobs to the needs list as they are added
    if: >-
      always()
      && needs.poll-prs.result == 'success'
      && needs.pr-file-reviewer.result != 'failure'
      && needs.pr-labeler.result != 'failure'
    steps:
      - name: Restore dispatcher state
        uses: actions/cache/restore@v5
        with:
          path: /tmp/dispatcher-state
          key: workflow-dispatcher-prs-${{ github.run_id }}
          restore-keys: workflow-dispatcher-prs-

      - name: Update dispatcher state
        env:
          PR_INCLUDE: ${{ needs.poll-prs.outputs.pr-include }}
          WORKFLOW_STARTED_AT: ${{ github.run_started_at }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_SINCE: ${{ github.event.inputs.since }}
        run: |
          STATE_FILE="/tmp/dispatcher-state/state.json"
          PRUNE_DAYS=30
          mkdir -p /tmp/dispatcher-state

          # Load existing state or start fresh
          if [ -f "$STATE_FILE" ]; then
            STATE=$(cat "$STATE_FILE")
          else
            STATE='{"dispatcher":{},"workflows":{}}'
          fi

          # Update dispatcher metadata
          if [ -n "$MANUAL_SINCE" ]; then
            MANUAL_SINCE_JSON="\"$MANUAL_SINCE\""
          else
            MANUAL_SINCE_JSON="null"
          fi

          STATE=$(echo "$STATE" | jq \
            --arg event "$EVENT_NAME" \
            --arg timestamp "$WORKFLOW_STARTED_AT" \
            --argjson manual_since "$MANUAL_SINCE_JSON" \
            '.dispatcher = {event: $event, timestamp: $timestamp, manual_since: $manual_since}')

          # Update workflow state with dispatched PRs
          CUTOFF_DATE=$(date -u -d "${PRUNE_DAYS} days ago" '+%Y-%m-%dT%H:%M:%SZ')

          for WF in $DISPATCHED_WORKFLOWS; do
            # Ensure the workflow key exists
            STATE=$(echo "$STATE" | jq --arg wf "$WF" '.workflows[$wf] //= {}')

            # Add/update entries for dispatched PRs
            for ROW in $(echo "$PR_INCLUDE" | jq -c '.[]'); do
              PR_NUM=$(echo "$ROW" | jq -r '.pr_number')
              HEAD_SHA=$(echo "$ROW" | jq -r '.head_sha')
              EVENT_ID=$(echo "$ROW" | jq -r '.last_event_id')

              STATE=$(echo "$STATE" | jq \
                --arg wf "$WF" \
                --arg pr "$PR_NUM" \
                --arg event_id "$EVENT_ID" \
                --arg head_sha "$HEAD_SHA" \
                --arg timestamp "$WORKFLOW_STARTED_AT" \
                '.workflows[$wf][$pr] = {event_id: $event_id, head_sha: $head_sha, timestamp: $timestamp}')
            done

            # Prune entries older than 30 days
            STATE=$(echo "$STATE" | jq --arg wf "$WF" --arg cutoff "$CUTOFF_DATE" \
              '.workflows[$wf] = (.workflows[$wf] | to_entries | map(select(.value.timestamp >= $cutoff)) | from_entries)')
          done

          echo "$STATE" | jq '.' > "$STATE_FILE"
          echo "State updated:"
          jq '.' "$STATE_FILE"

      - name: Save dispatcher state
        uses: actions/cache/save@v5
        with:
          path: /tmp/dispatcher-state
          key: workflow-dispatcher-prs-${{ github.run_id }}

      - name: Clean up old state cache entries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_KEY: workflow-dispatcher-prs-${{ github.run_id }}
        run: |
          gh api "repos/${REPO}/actions/caches?key=workflow-dispatcher-prs-" --jq '.actions_caches[].key' | while read -r KEY; do
            if [ "$KEY" != "$CURRENT_KEY" ]; then
              gh api -X DELETE "repos/${REPO}/actions/caches?key=${KEY}" 2>/dev/null || true
            fi
          done
