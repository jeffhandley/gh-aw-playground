name: PR Workflow Dispatcher

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'ISO 8601 timestamp — find PRs updated at or after this time (default: time of last successful run)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  poll-prs:
    name: Poll PRs
    runs-on: ubuntu-latest
    outputs:
      pr-numbers: ${{ steps.build-matrix.outputs.pr-numbers }}
      pr-include: ${{ steps.build-matrix.outputs.pr-include }}
    steps:
      - name: Restore last-successful-run timestamp
        uses: actions/cache/restore@v4
        with:
          path: /tmp/workflow-dispatcher-prs
          key: workflow-dispatcher-prs-timestamp-
          restore-keys: workflow-dispatcher-prs-timestamp-

      - name: Determine lookback timestamp
        id: since
        env:
          WORKFLOW_STARTED_AT: ${{ github.run_started_at }}
        run: |
          MANUAL_SINCE="${{ github.event.inputs.since }}"
          CACHED_SINCE=""
          if [ -f /tmp/workflow-dispatcher-prs/last-successful-run ]; then
            CACHED_SINCE=$(cat /tmp/workflow-dispatcher-prs/last-successful-run)
          fi

          if [ -n "$MANUAL_SINCE" ]; then
            SINCE="$MANUAL_SINCE"
          elif [ -n "$CACHED_SINCE" ]; then
            SINCE="$CACHED_SINCE"
          else
            # First run or expired cache: look back to the beginning of today (UTC)
            SINCE=$(date -u '+%Y-%m-%dT00:00:00Z')
            echo "::notice::No previous run found — falling back to beginning of today (UTC): $SINCE"
          fi

          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "Using lookback timestamp: $SINCE"

      - name: Find PRs and build dispatch matrices
        id: build-matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE: ${{ steps.since.outputs.since }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch all PRs (open and closed) updated since the last successful run,
          # including head SHA for cache-based skip checks.
          PRS=$(gh pr list \
            --repo "$REPO" \
            --state all \
            --json number,isDraft,state,updatedAt,headRefOid \
            --limit 100 \
            --jq "[.[] | select(.updatedAt >= \"$SINCE\")]")

          PR_COUNT=$(echo "$PRS" | jq 'length')
          echo "PRs updated since $SINCE:"
          if [ "$PR_COUNT" -eq "0" ]; then
            echo "  (none)"
          else
            echo "$PRS" | jq -r '.[] | "  PR #\(.number) (\(.state)\(if .isDraft then ", draft" else "" end)) @ \(.headRefOid[:7])"'
          fi

          # Build a unified matrix of all updated PRs.
          # Each workflow is responsible for its own eligibility filtering.
          # The dispatcher uses the latest event ID as a cursor — any PR activity
          # (push, label, close, ready_for_review, etc.) produces a new event ID,
          # ensuring the PR gets re-dispatched when anything changes.
          WORKFLOWS="pr-file-reviewer pr-labeler"
          MATRIX="[]"

          echo ""
          for ROW in $(echo "$PRS" | jq -c '.[]'); do
            PR_NUMBER=$(echo "$ROW" | jq -r '.number')
            HEAD_SHA=$(echo "$ROW" | jq -r '.headRefOid')

            # Get the latest event ID for this PR as a change cursor
            LAST_EVENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/events" --jq 'last | .id // empty')
            if [ -z "$LAST_EVENT_ID" ]; then
              LAST_EVENT_ID="none"
            fi

            # Check if ALL workflows have already processed this PR at this event
            ALL_CACHED=true
            for WF in $WORKFLOWS; do
              CACHE_KEY="${WF}-${PR_NUMBER}-${LAST_EVENT_ID}"
              CACHE_EXISTS=$(gh api "repos/${REPO}/actions/caches?key=${CACHE_KEY}" --jq '.total_count')
              if [ "$CACHE_EXISTS" -eq "0" ]; then
                ALL_CACHED=false
                break
              fi
            done

            if [ "$ALL_CACHED" = "true" ]; then
              echo "PR #${PR_NUMBER} — all workflows completed (event ${LAST_EVENT_ID})"
            else
              echo "PR #${PR_NUMBER} — dispatching (event ${LAST_EVENT_ID})"
              MATRIX=$(echo "$MATRIX" | jq -c ". + [{\"pr_number\": $PR_NUMBER, \"head_sha\": \"$HEAD_SHA\", \"last_event_id\": \"$LAST_EVENT_ID\"}]")
            fi
          done

          echo ""
          echo "Dispatch matrix: $MATRIX"
          echo "pr-numbers=$(echo "$MATRIX" | jq -c '[.[].pr_number]')" >> "$GITHUB_OUTPUT"
          echo "pr-include=$MATRIX" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # PR File Reviewer
  # ──────────────────────────────────────────────

  pr-file-reviewer:
    name: 'Dispatch: pr-file-reviewer'
    needs: poll-prs
    if: needs.poll-prs.outputs.pr-numbers != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pr_number: ${{ fromJSON(needs.poll-prs.outputs.pr-numbers) }}
        include: ${{ fromJSON(needs.poll-prs.outputs.pr-include) }}
    uses: ./.github/workflows/pr-file-reviewer.lock.yml
    with:
      pr_number: ${{ matrix.pr_number }}
      head_sha: ${{ matrix.head_sha }}
      artifact_id: pr-file-reviewer
    secrets: inherit

  record-run_pr-file-reviewer:
    name: 'Record: pr-file-reviewer'
    needs: [poll-prs, pr-file-reviewer]
    if: always() && needs.pr-file-reviewer.result != 'failure' && needs.poll-prs.outputs.pr-numbers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.poll-prs.outputs.pr-numbers) }}
        include: ${{ fromJSON(needs.poll-prs.outputs.pr-include) }}
    steps:
      - name: Save completion marker
        run: |
          echo "Recording successful run for PR #${{ matrix.pr_number }} (event ${{ matrix.last_event_id }})"
          mkdir -p /tmp/workflow-run-marker
          echo "${{ matrix.last_event_id }}" > /tmp/workflow-run-marker/last_event_id
      - uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-run-marker
          key: pr-file-reviewer-${{ matrix.pr_number }}-${{ matrix.last_event_id }}
      - name: Clean up old markers for this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_KEY="pr-file-reviewer-${{ matrix.pr_number }}-${{ matrix.last_event_id }}"
          gh api "repos/${REPO}/actions/caches?key=pr-file-reviewer-${{ matrix.pr_number }}-" --jq '.actions_caches[].key' | while read -r KEY; do
            if [ "$KEY" != "$CURRENT_KEY" ]; then
              gh api -X DELETE "repos/${REPO}/actions/caches?key=${KEY}" 2>/dev/null || true
            fi
          done

  # ──────────────────────────────────────────────
  # Add additional PR workflow sections here.
  # Pattern: dispatch job → record job
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # PR Labeler
  # ──────────────────────────────────────────────

  pr-labeler:
    name: 'Dispatch: pr-labeler'
    needs: poll-prs
    if: needs.poll-prs.outputs.pr-numbers != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pr_number: ${{ fromJSON(needs.poll-prs.outputs.pr-numbers) }}
        include: ${{ fromJSON(needs.poll-prs.outputs.pr-include) }}
    uses: ./.github/workflows/pr-labeler.lock.yml
    with:
      pr_number: ${{ matrix.pr_number }}
      head_sha: ${{ matrix.head_sha }}
      artifact_id: pr-labeler
    secrets: inherit

  record-run_pr-labeler:
    name: 'Record: pr-labeler'
    needs: [poll-prs, pr-labeler]
    if: always() && needs.pr-labeler.result != 'failure' && needs.poll-prs.outputs.pr-numbers != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.poll-prs.outputs.pr-numbers) }}
        include: ${{ fromJSON(needs.poll-prs.outputs.pr-include) }}
    steps:
      - name: Save completion marker
        run: |
          echo "Recording successful run for PR #${{ matrix.pr_number }} (event ${{ matrix.last_event_id }})"
          mkdir -p /tmp/workflow-run-marker
          echo "${{ matrix.last_event_id }}" > /tmp/workflow-run-marker/last_event_id
      - uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-run-marker
          key: pr-labeler-${{ matrix.pr_number }}-${{ matrix.last_event_id }}
      - name: Clean up old markers for this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_KEY="pr-labeler-${{ matrix.pr_number }}-${{ matrix.last_event_id }}"
          gh api "repos/${REPO}/actions/caches?key=pr-labeler-${{ matrix.pr_number }}-" --jq '.actions_caches[].key' | while read -r KEY; do
            if [ "$KEY" != "$CURRENT_KEY" ]; then
              gh api -X DELETE "repos/${REPO}/actions/caches?key=${KEY}" 2>/dev/null || true
            fi
          done

  # ──────────────────────────────────────────────
  # Conclusion
  # ──────────────────────────────────────────────

  conclusion:
    name: Conclusion
    runs-on: ubuntu-latest
    needs: [poll-prs, pr-file-reviewer, record-run_pr-file-reviewer, pr-labeler, record-run_pr-labeler]
    # Add additional workflow jobs to the needs list as they are added
    if: >-
      always()
      && needs.poll-prs.result == 'success'
      && needs.pr-file-reviewer.result != 'failure'
      && needs.pr-labeler.result != 'failure'
    steps:
      - name: Write last-successful-run timestamp
        env:
          WORKFLOW_STARTED_AT: ${{ github.run_started_at }}
        run: |
          mkdir -p /tmp/workflow-dispatcher-prs
          echo "$WORKFLOW_STARTED_AT" > /tmp/workflow-dispatcher-prs/last-successful-run

      - name: Save last-successful-run timestamp
        uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-dispatcher-prs
          key: workflow-dispatcher-prs-timestamp-${{ github.run_id }}

      - name: Clean up old timestamp cache entries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_KEY: workflow-dispatcher-prs-timestamp-${{ github.run_id }}
        run: |
          gh api "repos/${REPO}/actions/caches?key=workflow-dispatcher-prs-timestamp-" --jq '.actions_caches[].key' | while read -r KEY; do
            if [ "$KEY" != "$CURRENT_KEY" ]; then
              gh api -X DELETE "repos/${REPO}/actions/caches?key=${KEY}" 2>/dev/null || true
            fi
          done

      - name: Summary
        run: |
          PR_NUMBERS='${{ needs.poll-prs.outputs.pr-numbers }}'
          PR_COUNT=$(echo "$PR_NUMBERS" | jq 'length')

          FILE_REVIEWER='${{ needs.pr-file-reviewer.result }}'
          LABELER='${{ needs.pr-labeler.result }}'
          RECORD_FILE_REVIEWER='${{ needs.record-run_pr-file-reviewer.result }}'
          RECORD_LABELER='${{ needs.record-run_pr-labeler.result }}'

          # Map result to emoji
          icon() {
            case "$1" in
              success)   echo "✅" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "⚠️" ;;
              failure)   echo "❌" ;;
              *)         echo "❔" ;;
            esac
          }

          {
            echo "## PR Workflow Dispatcher"
            echo ""

            if [ "$PR_COUNT" -eq "0" ]; then
              echo "No PRs required dispatching."
            else
              echo "Dispatched **${PR_COUNT}** PR(s): $(echo "$PR_NUMBERS" | jq -r '[.[] | "#\(.)"] | join(", ")')"
              echo ""
              echo "| Workflow | Dispatch | Record |"
              echo "| --- | --- | --- |"
              echo "| pr-file-reviewer | $(icon "$FILE_REVIEWER") $FILE_REVIEWER | $(icon "$RECORD_FILE_REVIEWER") $RECORD_FILE_REVIEWER |"
              echo "| pr-labeler | $(icon "$LABELER") $LABELER | $(icon "$RECORD_LABELER") $RECORD_LABELER |"
            fi

            echo ""
            echo "Timestamp recorded: \`${{ github.run_started_at }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
