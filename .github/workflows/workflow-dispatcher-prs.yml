name: PR Workflow Dispatcher

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'ISO 8601 timestamp — find PRs updated at or after this time (default: time of last successful run)'
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  find-prs:
    name: Find PRs to dispatch
    runs-on: ubuntu-latest
    outputs:
      pr-file-reviewer-numbers: ${{ steps.build-matrix.outputs.pr-file-reviewer-numbers }}
      pr-file-reviewer-include: ${{ steps.build-matrix.outputs.pr-file-reviewer-include }}
      pr-labeler-numbers: ${{ steps.build-matrix.outputs.pr-labeler-numbers }}
      pr-labeler-include: ${{ steps.build-matrix.outputs.pr-labeler-include }}
    steps:
      - name: Restore last-successful-run timestamp
        uses: actions/cache/restore@v4
        with:
          path: /tmp/workflow-dispatcher-prs
          key: workflow-dispatcher-prs-timestamp-
          restore-keys: workflow-dispatcher-prs-timestamp-

      - name: Determine lookback timestamp
        id: since
        env:
          WORKFLOW_STARTED_AT: ${{ github.run_started_at }}
        run: |
          MANUAL_SINCE="${{ github.event.inputs.since }}"
          CACHED_SINCE=""
          if [ -f /tmp/workflow-dispatcher-prs/last-successful-run ]; then
            CACHED_SINCE=$(cat /tmp/workflow-dispatcher-prs/last-successful-run)
          fi

          if [ -n "$MANUAL_SINCE" ]; then
            SINCE="$MANUAL_SINCE"
          elif [ -n "$CACHED_SINCE" ]; then
            SINCE="$CACHED_SINCE"
          else
            # First run or expired cache: look back 20 minutes to avoid gaps
            SINCE=$(date -u -d '20 minutes ago' '+%Y-%m-%dT%H:%M:%SZ')
          fi

          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "Using lookback timestamp: $SINCE"

      - name: Find PRs and build dispatch matrices
        id: build-matrix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINCE: ${{ steps.since.outputs.since }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch all PRs (open and closed) updated since the last successful run,
          # including head SHA for cache-based skip checks.
          PRS=$(gh pr list \
            --repo "$REPO" \
            --state all \
            --json number,isDraft,state,updatedAt,headRefOid \
            --limit 100 \
            --jq "[.[] | select(.updatedAt >= \"$SINCE\")]")

          PR_COUNT=$(echo "$PRS" | jq 'length')
          echo "PRs updated since $SINCE:"
          if [ "$PR_COUNT" -eq "0" ]; then
            echo "  (none)"
          else
            echo "$PRS" | jq -r '.[] | "  PR #\(.number) (\(.state)\(if .isDraft then ", draft" else "" end)) @ \(.headRefOid[:7])"'
          fi

          #
          # pr-file-reviewer: non-draft PRs (open or closed)
          #
          echo ""
          echo "pr-file-reviewer:"
          CANDIDATES=$(echo "$PRS" | jq -c '[.[] | select(.isDraft == false)]')

          PR_FILE_REVIEWER="[]"
          for ROW in $(echo "$CANDIDATES" | jq -c '.[]'); do
            PR_NUMBER=$(echo "$ROW" | jq -r '.number')
            HEAD_SHA=$(echo "$ROW" | jq -r '.headRefOid')
            CACHE_KEY="pr-file-reviewer-${PR_NUMBER}-${HEAD_SHA}"
            CACHE_EXISTS=$(gh api "repos/${REPO}/actions/caches?key=${CACHE_KEY}" --jq '.total_count')

            if [ "$CACHE_EXISTS" -gt "0" ]; then
              echo "  PR #${PR_NUMBER} — already reviewed at ${HEAD_SHA:0:7}"
            else
              echo "  PR #${PR_NUMBER} — needs review at ${HEAD_SHA:0:7}"
              PR_FILE_REVIEWER=$(echo "$PR_FILE_REVIEWER" | jq -c ". + [{\"pr_number\": $PR_NUMBER, \"head_sha\": \"$HEAD_SHA\"}]")
            fi
          done

          DRAFT_COUNT=$(echo "$PRS" | jq '[.[] | select(.isDraft == true)] | length')
          if [ "$DRAFT_COUNT" -gt "0" ]; then
            echo "$PRS" | jq -r '.[] | select(.isDraft == true) | "  PR #\(.number) — skipped (draft)"'
          fi

          if [ "$PR_COUNT" -gt "0" ] && [ "$(echo "$CANDIDATES" | jq 'length')" -eq "0" ] && [ "$DRAFT_COUNT" -eq "0" ]; then
            echo "  (no eligible PRs)"
          fi

          echo ""
          echo "pr-file-reviewer matrix: $PR_FILE_REVIEWER"
          echo "pr-file-reviewer-numbers=$(echo "$PR_FILE_REVIEWER" | jq -c '[.[].pr_number]')" >> "$GITHUB_OUTPUT"
          echo "pr-file-reviewer-include=$PR_FILE_REVIEWER" >> "$GITHUB_OUTPUT"

          #
          # pr-labeler: non-draft PRs (open or closed)
          #
          echo ""
          echo "pr-labeler:"
          LABELER_CANDIDATES=$(echo "$PRS" | jq -c '[.[] | select(.isDraft == false)]')

          PR_LABELER="[]"
          for ROW in $(echo "$LABELER_CANDIDATES" | jq -c '.[]'); do
            PR_NUMBER=$(echo "$ROW" | jq -r '.number')
            HEAD_SHA=$(echo "$ROW" | jq -r '.headRefOid')
            CACHE_KEY="pr-labeler-${PR_NUMBER}-${HEAD_SHA}"
            CACHE_EXISTS=$(gh api "repos/${REPO}/actions/caches?key=${CACHE_KEY}" --jq '.total_count')

            if [ "$CACHE_EXISTS" -gt "0" ]; then
              echo "  PR #${PR_NUMBER} — already labeled at ${HEAD_SHA:0:7}"
            else
              echo "  PR #${PR_NUMBER} — needs labeling at ${HEAD_SHA:0:7}"
              PR_LABELER=$(echo "$PR_LABELER" | jq -c ". + [{\"pr_number\": $PR_NUMBER, \"head_sha\": \"$HEAD_SHA\"}]")
            fi
          done

          DRAFT_COUNT=$(echo "$PRS" | jq '[.[] | select(.isDraft == true)] | length')
          if [ "$DRAFT_COUNT" -gt "0" ]; then
            echo "$PRS" | jq -r '.[] | select(.isDraft == true) | "  PR #\(.number) — skipped (draft)"'
          fi

          if [ "$PR_COUNT" -gt "0" ] && [ "$(echo "$LABELER_CANDIDATES" | jq 'length')" -eq "0" ]; then
            echo "  (no eligible PRs)"
          fi

          echo ""
          echo "pr-labeler matrix: $PR_LABELER"
          echo "pr-labeler-numbers=$(echo "$PR_LABELER" | jq -c '[.[].pr_number]')" >> "$GITHUB_OUTPUT"
          echo "pr-labeler-include=$PR_LABELER" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # PR File Reviewer
  # ──────────────────────────────────────────────

  pr-file-reviewer:
    name: PR File Reviewer
    needs: find-prs
    if: needs.find-prs.outputs.pr-file-reviewer-numbers != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pr_number: ${{ fromJSON(needs.find-prs.outputs.pr-file-reviewer-numbers) }}
        include: ${{ fromJSON(needs.find-prs.outputs.pr-file-reviewer-include) }}
    uses: ./.github/workflows/pr-file-reviewer.lock.yml
    with:
      pr_number: ${{ matrix.pr_number }}
      head_sha: ${{ matrix.head_sha }}
      artifact_id: pr-file-reviewer
    secrets: inherit

  record-run_pr-file-reviewer:
    name: Record PR File Review
    needs: [find-prs, pr-file-reviewer]
    if: always() && needs.pr-file-reviewer.result != 'failure'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.find-prs.outputs.pr-file-reviewer-numbers) }}
        include: ${{ fromJSON(needs.find-prs.outputs.pr-file-reviewer-include) }}
    steps:
      - name: Save completion marker
        run: |
          echo "Recording successful run for PR #${{ matrix.pr_number }} at ${{ matrix.head_sha }}"
          mkdir -p /tmp/workflow-run-marker
          echo "${{ matrix.head_sha }}" > /tmp/workflow-run-marker/head_sha
      - uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-run-marker
          key: pr-file-reviewer-${{ matrix.pr_number }}-${{ matrix.head_sha }}
      - name: Clean up old markers for this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_KEY="pr-file-reviewer-${{ matrix.pr_number }}-${{ matrix.head_sha }}"
          gh api "repos/${REPO}/actions/caches?key=pr-file-reviewer-${{ matrix.pr_number }}-" --jq '.actions_caches[].key' | while read -r KEY; do
            if [ "$KEY" != "$CURRENT_KEY" ]; then
              gh api -X DELETE "repos/${REPO}/actions/caches?key=${KEY}" 2>/dev/null || true
            fi
          done

  # ──────────────────────────────────────────────
  # Add additional PR workflow sections here.
  # Pattern: workflow job → record-run_<workflow-name> job
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # PR Labeler
  # ──────────────────────────────────────────────

  pr-labeler:
    name: PR Labeler
    needs: find-prs
    if: needs.find-prs.outputs.pr-labeler-numbers != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        pr_number: ${{ fromJSON(needs.find-prs.outputs.pr-labeler-numbers) }}
        include: ${{ fromJSON(needs.find-prs.outputs.pr-labeler-include) }}
    uses: ./.github/workflows/pr-labeler.lock.yml
    with:
      pr_number: ${{ matrix.pr_number }}
      head_sha: ${{ matrix.head_sha }}
      artifact_id: pr-labeler
    secrets: inherit

  record-run_pr-labeler:
    name: Record PR Labeling
    needs: [find-prs, pr-labeler]
    if: always() && needs.pr-labeler.result != 'failure'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr_number: ${{ fromJSON(needs.find-prs.outputs.pr-labeler-numbers) }}
        include: ${{ fromJSON(needs.find-prs.outputs.pr-labeler-include) }}
    steps:
      - name: Save completion marker
        run: |
          echo "Recording successful run for PR #${{ matrix.pr_number }} at ${{ matrix.head_sha }}"
          mkdir -p /tmp/workflow-run-marker
          echo "${{ matrix.head_sha }}" > /tmp/workflow-run-marker/head_sha
      - uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-run-marker
          key: pr-labeler-${{ matrix.pr_number }}-${{ matrix.head_sha }}
      - name: Clean up old markers for this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          CURRENT_KEY="pr-labeler-${{ matrix.pr_number }}-${{ matrix.head_sha }}"
          gh api "repos/${REPO}/actions/caches?key=pr-labeler-${{ matrix.pr_number }}-" --jq '.actions_caches[].key' | while read -r KEY; do
            if [ "$KEY" != "$CURRENT_KEY" ]; then
              gh api -X DELETE "repos/${REPO}/actions/caches?key=${KEY}" 2>/dev/null || true
            fi
          done

  # ──────────────────────────────────────────────
  # Dispatcher bookkeeping
  # ──────────────────────────────────────────────

  record-successful-run:
    name: Record successful run timestamp
    runs-on: ubuntu-latest
    needs: [find-prs, pr-file-reviewer, record-run_pr-file-reviewer, pr-labeler, record-run_pr-labeler]
    # Add additional workflow jobs to the needs list as they are added
    if: >-
      always()
      && needs.find-prs.result == 'success'
      && needs.pr-file-reviewer.result != 'failure'
      && needs.pr-labeler.result != 'failure'
    steps:
      - name: Write last-successful-run timestamp
        env:
          WORKFLOW_STARTED_AT: ${{ github.run_started_at }}
        run: |
          mkdir -p /tmp/workflow-dispatcher-prs
          echo "$WORKFLOW_STARTED_AT" > /tmp/workflow-dispatcher-prs/last-successful-run

      - name: Save last-successful-run timestamp
        uses: actions/cache/save@v4
        with:
          path: /tmp/workflow-dispatcher-prs
          key: workflow-dispatcher-prs-timestamp-${{ github.run_id }}

      - name: Clean up old timestamp cache entries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_KEY: workflow-dispatcher-prs-timestamp-${{ github.run_id }}
        run: |
          gh api "repos/${REPO}/actions/caches?key=workflow-dispatcher-prs-timestamp-" --jq '.actions_caches[].key' | while read -r KEY; do
            if [ "$KEY" != "$CURRENT_KEY" ]; then
              gh api -X DELETE "repos/${REPO}/actions/caches?key=${KEY}" 2>/dev/null || true
            fi
          done
