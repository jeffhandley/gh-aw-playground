name: 'Select Copilot PAT from Pool'
description: >
  Selects a random Copilot PAT from a numbered pool of secrets. Secrets
  are passed as environment variables COPILOT_PAT_0 through COPILOT_PAT_9
  by the calling workflow step.

inputs:
  random-seed:
    description: 'A seed number to use for the random PAT selection, for deterministic selection if needed.'
    required: false
    default: ''

outputs:
  copilot_pat_number:
    description: 'The selected token number'
    value: ${{ steps.select.outputs.copilot_pat_number }}

runs:
  using: composite
  steps:
    - id: select-pat
      shell: bash
      env:
        RANDOM_SEED: ${{ inputs.random-seed }}
      run: |
        # Collect all secret numbers with non-empty values from COPILOT_PAT_0..COPILOT_PAT_9
        PAT_NUMBERS=()
        for i in $(seq 0 9); do
          var="COPILOT_PAT_${i}"
          val="${!var}"
          if [ -n "$val" ]; then
            PAT_NUMBERS+=(${i})
          fi
        done

        if [ ${#PAT_NUMBERS[@]} -eq 0 ]; then
          echo "::error::No Copilot PAT secrets found (checked COPILOT_PAT_0 through COPILOT_PAT_9)"
          exit 1
        fi

        # Select a random index using the seed if specified
        if [ -n "$RANDOM_SEED" ]; then
          RANDOM=$RANDOM_SEED
        fi

        PAT_INDEX=$(( RANDOM % ${#PAT_NUMBERS[@]} ))
        PAT_NUMBER="${PAT_NUMBERS[$PAT_INDEX]}"
        echo "Selected token ${PAT_NUMBER} (index: ${PAT_INDEX}; pool size: ${#PAT_NUMBERS[@]})"

        # Set the PAT number as the output
        echo "copilot_pat_number=${PAT_NUMBER}" >> "$GITHUB_OUTPUT"
